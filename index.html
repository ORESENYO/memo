<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トークスクリプト集</title>
  <link rel="stylesheet" href="style.css">
  <script src="sidemenu.js"></script>
</head>
<body>

<header>
  <div class="hd-left">
    <button id="menuBtn" onclick="toggleSideMenu()">☰</button>
    <button class="nav-btn" onclick="goHome()">🏠 ホーム</button>
    <button class="nav-btn" onclick="openNamedTab('mail.html','mailTab')">✉️ メール</button>
  </div>
  <div class="hd-center">
    <div class="header-title">トークスクリプト集</div>
  </div>
  <div class="hd-right">
    <button class="nav-btn nav-btn-admin" onclick="location.href='admin.html'">🛠 管理</button>
    <button class="nav-btn" onclick="triggerImport()" title="JSONファイルを読み込んでデータを更新">📤 データ更新</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    <div class="quick-copy-area">
      <button class="quick-copy-btn nav-btn-green" id="quickCopyBtn" onclick="toggleQuickMenu()">💬 定型文</button>
      <div class="quick-menu" id="quickMenu">
        <div class="quick-menu-item" onclick="copyText('✊HELP✊', 'HELP')">✊ HELP</div>
        <div class="quick-menu-item" onclick="copyText('✌保留中✌', '話中')">✌ 話中</div>
        <div class="quick-menu-item" onclick="copyText('✋後処理✋', '後処理')">✋ 後処理</div>
        <div class="quick-menu-item" onclick="copyText('検証機お願いします（iPhone）', 'iPhone')">📱 iPhone</div>
        <div class="quick-menu-item" onclick="copyText('検証機お願いします（Android）', 'Android')">🤖 Android</div>
        <div class="quick-menu-item" onclick="copyText('休憩よろしいですか', '10休')">☕ 10休</div>
      </div>
      <div class="quick-copy-toast" id="quickCopyToast"></div>
    </div>
    <div class="search-area">
      <input type="text" id="searchBox" placeholder="スクリプト検索（タイトル・本文）" autocomplete="off">
      <button id="clearBtn">×</button>
      <div id="suggestBox"></div>
    </div>
  </div>
</header>

<aside id="sideMenu"></aside>

<main>
  <div class="opening">
    <div class="opening-title">オープニングトーク</div>
    <div class="opening-text">お電話ありがとうございます。〇〇窓口 担当●●でございます。</div>
  </div>

  <div id="contentArea"></div>

  <div class="closing">
    <div class="opening-title">クロージングトーク</div>
    <div id="closingText" class="opening-text">
      ご案内は以上となりますが、そのほか確認されたいことなどはございませんでしょうか？
    </div>
    <div class="closing-buttons">
      <button onclick="closingNone()">不明点なし</button>
      <button onclick="closingAsk()">不明点あり</button>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
